name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Flet
      run: |
        pip install --upgrade pip
        pip install flet
    
    - name: Build APK
      run: |
        flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Calculadora-Financiera
        path: build/apk/*.apk
